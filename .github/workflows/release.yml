name: Build & Release

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v2.1.3 等标签触发

jobs:
  # ==================== Android x86_64 ====================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib/

      - name: Build APK (x86_64)
        run: flutter build apk --release --target-platform android-x64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtbbs-android-x64
          path: build/app/outputs/flutter-apk/app-release.apk

  # ==================== Windows x64 ====================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib/

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtbbs-windows-x64
          path: build/windows/x64/runner/Release/

  # ==================== 创建 Release ====================
  release:
    needs: [android, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: mtbbs-android-x64
          path: release

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: mtbbs-windows-x64
          path: release/windows

      - name: Zip Windows build
        run: |
          cd release/windows
          zip -r ../mtbbs-windows-x64.zip .
          cd ../..
          rm -rf release/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MT论坛 ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            release/app-release.apk
            release/mtbbs-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
