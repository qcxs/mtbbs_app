name: Build & Release

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.2.3-beta 等

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # ==================== Android x86_64（已签名）====================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Update version
        run: |
          V="${VERSION#v}"
          VC=$(echo "$V" | sed 's/[^0-9]//g')
          sed -i "s/^version:.*/version: $V+$VC/" pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib/

      - name: Build APK (x86_64)
        run: flutter build apk --release --target-platform android-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MT论坛 ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
